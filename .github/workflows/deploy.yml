name: Deploy to Release

on:
  push:
    tags:
      - 'v*'

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build

      - name: Generate Attestation
        uses: actions/attest@v4
        with:
          subject-path: build/libs/*.jar

      - name: Extract Release Notes
        id: notes
        run: |
          TAG="${{ github.ref_name }}"
          if [ -f "changelog.md" ]; then
            sed -n "/^# $TAG/,/^# /p" changelog.md | sed '1d;$d' > notes.txt
            NOTES=$(<notes.txt)
          else
            NOTES="Release $TAG"
          fi
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release with jar
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: build/libs/*.jar
          body: |
            ${{ steps.notes.outputs.content }}

            ---
            **Verified by GitHub Artifact Attestations**
          prerelease: ${{ contains(github.ref_name, 'alpha') }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}