# Loader Settings
modLoader     = "javafml"
loaderVersion = "${forge_version_range}"

# Mod Settings
license         = "${mod_license}"
issueTrackerURL = "${mod_issue}"
[[mods]]
  modId       = "${mod_id}"
  displayName = "${mod_name}"
  version     = "${mod_version}"
  authors     = "${mod_authors}"
  credits     = "${mod_credits}"
  logoFile    = "${mod_id}.png"
  displayURL  = "${mod_url}"
  description = '''${mod_description}'''
  displayTest = "MATCH_VERSION"

# Minecraft Dependency
[[dependencies."${mod_id}"]]
  modId        = "minecraft"
  mandatory    = true
  versionRange = "${minecraft_version_range}"
  ordering     = "NONE"
  side         = "BOTH"

# Forge Dependency
[[dependencies."${mod_id}"]]
  modId        = "forge"
  mandatory    = true
  versionRange = "${forge_version_range}"
  ordering     = "NONE"
  side         = "BOTH"

# Iron's Spells'n Spellbooks Dependency
[[dependencies."${mod_id}"]]
  modId        = "irons_spellbooks"
  mandatory    = true
  versionRange = "[1.20.1-3.15.0,)"
  ordering     = "NONE"
  side         = "BOTH"